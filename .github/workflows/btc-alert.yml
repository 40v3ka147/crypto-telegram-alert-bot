name: BTC Telegram Alerts

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-alert-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BTC alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ALERT_5M_PCT: ${{ vars.ALERT_5M_PCT || '1.0' }}
          ALERT_15M_PCT: ${{ vars.ALERT_15M_PCT || '2.0' }}
          ALERT_60M_PCT: ${{ vars.ALERT_60M_PCT || '3.5' }}
          ALERT_24H_PCT: ${{ vars.ALERT_24H_PCT || '6.0' }}
          COOLDOWN_MINUTES: ${{ vars.COOLDOWN_MINUTES || '30' }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: python btc_alert_bot.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state/btc_state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/btc_state.json
            git commit -m "bot: update BTC state [skip ci]"
            git push
          else
            echo "No state file changes to commit."
          fi
